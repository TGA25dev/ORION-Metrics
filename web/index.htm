<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORION Metrics Overlay</title>
<meta name="description" content="Affichage de la télémétrie de la mission Artemis II en temps réel." />
<link rel="icon" href="/web/favicon.ico" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/web/style.css">
</head>
<body>

<div class="dashboard-container">
  <!-- HUD 1 -->
  <div class="hud-wrapper">
    <div class="hud-circle">
      <div class="progress" style="--prog-deg: 120deg;"></div>
      <div class="content">
        <div class="time">--:--:--</div>
        <div class="unit">J:H:M</div>
      </div>
    </div>
    <div class="label">TEMPS<br>ÉCOULÉ</div>
  </div>

  <!-- HUD 2-->
  <div class="hud-wrapper">
    <div class="hud-circle">
      <div class="progress" style="--prog-deg: 60deg;"></div>
      <div class="content">
        <div class="time">--</div>
        <div class="unit">KM/H</div>
      </div>
    </div>
    <div class="label">VITESSE</div>
  </div>

  <!-- HUD 3 -->
  <div class="hud-wrapper">
    <div class="hud-circle">
      <div class="progress" style="--prog-deg: 200deg;"></div>
      <div class="content">
        <div class="time">--</div>
        <div class="unit">KM</div>
      </div>
    </div>
    <div class="label">DISTANCE<br>DE LA TERRE</div>
  </div>

  <!-- HUD 4-->
  <div class="hud-wrapper">
    <div class="hud-circle">
      <div class="progress" style="--prog-deg: 310deg;"></div>
      <div class="content">
        <div class="time" id="val-moon">--</div>
        <div class="unit">KM</div>
      </div>
    </div>
    <div class="label">DISTANCE<br>DE LA LUNE</div>
  </div>
</div>
<script src="/web/script.js"></script>
</body>
</html>
